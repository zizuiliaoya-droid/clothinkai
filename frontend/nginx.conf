server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # U06a 导入上传 body 上限（NF-6 L1 网关层）：业务 20MB + 1MB multipart 边界。
    # 若导入上传经本 nginx 反代后端（同域部署），此处在 multipart 落盘前拦截超大请求防 DoS；
    # 分离部署（前端域与 API 域独立）时，API 网关需各自配置同等上限。
    # L2 handler（IMPORT_MAX_FILE_MB）+ L3 解析行数（IMPORT_MAX_ROWS）为应用层兜底。
    client_max_body_size 21m;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
