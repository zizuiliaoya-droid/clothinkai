# Alembic 配置（U01 + 后续单元共享）
# 实际数据库 URL 通过环境变量 DATABASE_URL_BYPASS 由 alembic/env.py 读取

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
sqlalchemy.url =

# 文件命名：{NNN}_{unit-id}_{description}.py
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60

timezone = UTC
revision_environment = false
sourceless = false

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
